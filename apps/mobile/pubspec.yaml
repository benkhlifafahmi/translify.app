name: translify
description: Translify — read, translate, chat, and quiz your books on the go.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2

  # State / persistence
  provider: ^6.1.2
  shared_preferences: ^2.3.3

  # File picking + viewing
  file_picker: ^8.1.4
  syncfusion_flutter_pdfviewer: ^33.2.5
  syncfusion_flutter_pdf: ^33.2.5
  epub_view: ^3.2.0

  # External browser (Stripe checkout / customer portal)
  url_launcher: ^6.3.1

  # UI / fonts / fx
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.4+3
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
