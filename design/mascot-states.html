<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi · Expression Sheet — Translify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --paper: #FAF6EE; --paper-2: #F4ECDB; --ink: #20283A; --ink-soft: #4A5263;
  --saffron: #E0A458; --saffron-d: #C8893E; --sage: #7BA17C; --sage-d: #5F8763;
  --coral: #E2786C; --plum: #6B5B95; --border: #E5D8BC; --border-s: #D4C29C;
  --ff-d: 'Fraunces', ui-serif, Georgia, serif;
  --ff-b: 'Hanken Grotesk', ui-sans-serif, system-ui, sans-serif;
}
body {
  background: var(--paper); color: var(--ink); font-family: var(--ff-b);
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(at 15% 5%, rgba(224,164,88,.10) 0, transparent 40%),
    radial-gradient(at 94% 8%, rgba(123,161,124,.08) 0, transparent 36%),
    radial-gradient(at 78% 95%, rgba(226,120,108,.07) 0, transparent 34%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16  0 0 0 0 0.13  0 0 0 0 0.08  0 0 0 0.035 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  background-attachment: fixed;
}
.page { max-width: 1040px; margin: 0 auto; padding: 56px 28px 100px; }

/* header */
.page-header { margin-bottom: 52px; }
.page-header h1 { font-family: var(--ff-d); font-size: clamp(1.8rem,4vw,2.8rem); font-weight: 400; letter-spacing: -0.03em; }
.page-header p { font-size: 0.9rem; color: var(--ink-soft); margin-top: 4px; }
.back-link { font-size: 0.78rem; font-weight: 600; color: var(--saffron-d); letter-spacing: .04em; text-decoration: none; display:inline-flex; align-items:center; gap:4px; margin-bottom: 18px; opacity:.8; }

/* hero */
.hero {
  background: var(--ink);
  border-radius: 24px;
  padding: 48px 40px;
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 40px;
  align-items: center;
  margin-bottom: 52px;
  box-shadow: 0 2px 0 rgba(74,60,30,.04), 0 28px 56px -18px rgba(32,40,58,.35);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 15% 50%, rgba(224,164,88,.08) 0, transparent 55%),
              radial-gradient(ellipse at 85% 80%, rgba(123,161,124,.06) 0, transparent 45%);
  pointer-events: none;
}
.hero-lumi-wrap {
  display: flex; justify-content: center; align-items: center;
  position: relative;
}
.hero-lumi-wrap svg { filter: drop-shadow(0 12px 24px rgba(0,0,0,.25)); }
.hero-info { position: relative; }
.hero-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 999px;
  font-size: 0.7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  background: rgba(224,164,88,.18); color: var(--saffron);
  border: 1px solid rgba(224,164,88,.3);
  margin-bottom: 14px;
  transition: background .3s, color .3s, border-color .3s;
}
.hero-name {
  font-family: var(--ff-d); font-size: clamp(2rem,4vw,3rem); font-weight: 400;
  letter-spacing: -0.04em; color: #FAF6EE; margin-bottom: 12px;
  transition: opacity .25s;
}
.hero-desc { font-size: 1rem; color: rgba(250,246,238,.5); line-height: 1.6; max-width: 360px; transition: opacity .25s; }
.hero-nav { display: flex; gap: 10px; margin-top: 24px; }
.hero-btn {
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
  color: rgba(250,246,238,.55); border-radius: 8px; padding: 8px 16px;
  font-family: var(--ff-b); font-size: 0.8rem; font-weight: 600; cursor: pointer;
  transition: background .2s, color .2s;
}
.hero-btn:hover { background: rgba(255,255,255,.1); color: rgba(250,246,238,.9); }

/* section label */
.section-label {
  font-size: 0.68rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--ink-soft); margin-bottom: 24px;
}

/* state grid */
.state-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.state-card {
  background: linear-gradient(180deg, #FFFCF3 0%, var(--paper) 100%);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 20px 16px 18px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  cursor: pointer;
  transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, border-color .2s;
  box-shadow: 0 1px 0 rgba(74,60,30,.04), 0 4px 12px -6px rgba(74,60,30,.1);
  position: relative; overflow: hidden;
}
.state-card:hover {
  transform: translateY(-3px) scale(1.01);
  box-shadow: 0 2px 0 rgba(74,60,30,.04), 0 14px 28px -10px rgba(74,60,30,.18);
}
.state-card.active {
  border-color: var(--saffron);
  box-shadow: 0 0 0 3px rgba(224,164,88,.18), 0 8px 20px -8px rgba(74,60,30,.16);
}
.state-card .lumi-mini svg { display: block; }
.card-label { font-size: 0.82rem; font-weight: 600; color: var(--ink); }
.card-pill {
  padding: 2px 9px; border-radius: 999px;
  font-size: 0.63rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  border: 1px solid var(--border); color: var(--ink-soft); background: transparent;
}

/* animations */
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
@keyframes fade-swap { 0%{opacity:0;transform:scale(.94)} 100%{opacity:1;transform:scale(1)} }
.lumi-float { animation: float 4s ease-in-out infinite; }
.fade-in { animation: fade-swap .35s cubic-bezier(.34,1.2,.64,1) both; }

@media (max-width: 720px) {
  .hero { grid-template-columns: 1fr; text-align: center; }
  .hero-desc { margin: 0 auto; }
  .hero-nav { justify-content: center; }
  .state-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 480px) {
  .state-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>

<div class="page">

  <div class="page-header">
    <a class="back-link" href="brand.html">← Brand sheet</a>

    <div class="hero-info">

  <ellipse cx="90" cy="196" rx="38" ry="6" fill="rgba(32,40,58,.10)"/>

  ${book ? BOOK : ''}
  <path d="M72 180 Q68 186 64 184 M72 180 Q72 188 68 188 M72 180 Q76 188 72 188" stroke="#D4C29C" stroke-width="2" stroke-linecap="round"/>
  <path d="M108 180 Q104 186 100 184 M108 180 Q108 188 104 188 M108 180 Q112 188 108 188" stroke="#D4C29C" stroke-width="2" stroke-linecap="round"/>
  ${head}
    <ellipse cx="90" cy="84" rx="38" ry="36" fill="#FAF6EE" stroke="#E5D8BC" stroke-width="2"/>

// ─── Render ────────────────────────────────────────────────────────────────
let current = 0;

function scaleSVG(svgStr, size) {
  return svgStr.replace(`width="180"`, `width="${size}"`).replace(`height="200"`, `height="${Math.round(size * 200/180)}"`);
}

function selectState(idx) {
  current = idx;
  const s = STATES[idx];

  const heroSvg = document.getElementById('hero-svg');
  heroSvg.classList.remove('fade-in');
  void heroSvg.offsetWidth;
  heroSvg.innerHTML = scaleSVG(s.svg, 200);
  heroSvg.classList.add('fade-in');

  const tag = document.getElementById('hero-tag');
  tag.textContent = s.tag;
  tag.style.background = s.tagBg;
  tag.style.color = s.tagColor;
  tag.style.borderColor = s.tagBorder;

  document.getElementById('hero-name').textContent = s.label;
  document.getElementById('hero-desc').textContent = s.desc;

  document.querySelectorAll('.state-card').forEach((c, i) => {
    c.classList.toggle('active', i === idx);
  });
}

function buildGrid() {
  const grid = document.getElementById('state-grid');
  STATES.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'state-card' + (i === 0 ? ' active' : '');
    card.innerHTML = `
      <div class="lumi-mini">${scaleSVG(s.svg, 100)}</div>
      <div class="card-label">${s.label}</div>
      <div class="card-pill" style="color:${s.tagColor};border-color:${s.tagBorder};background:${s.tagBg}">${s.tag}</div>
    `;
    card.addEventListener('click', () => selectState(i));
    grid.appendChild(card);
  });
}

document.getElementById('btn-prev').addEventListener('click', () => selectState((current - 1 + STATES.length) % STATES.length));
document.getElementById('btn-next').addEventListener('click', () => selectState((current + 1) % STATES.length));

buildGrid();
selectState(0);
</script>
